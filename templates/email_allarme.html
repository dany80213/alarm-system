<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALLARME — Sistema di Sicurezza</title>
</head>
<body style="margin:0;padding:0;background:#0b1220;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0b1220;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="580" cellpadding="0" cellspacing="0" style="background:#111b2e;border:1px solid #1e293b;border-radius:12px;overflow:hidden;max-width:580px;width:100%;">

          <!-- Header rosso allarme -->
          <tr>
            <td style="background:#3b0d0d;padding:28px 32px;text-align:center;border-bottom:3px solid #ef4444;">
              <div style="font-size:40px;margin-bottom:10px;line-height:1;">&#9888;</div>
              <div style="font-size:28px;font-weight:700;color:#ef4444;letter-spacing:4px;font-family:'Courier New',monospace;">ALLARME</div>
              <div style="font-size:11px;color:#a87070;letter-spacing:2px;margin-top:6px;text-transform:uppercase;">Sistema di sicurezza attivato</div>
            </td>
          </tr>

          <!-- Dispositivo che ha triggerato -->
          <tr>
            <td style="padding:28px 32px 0;">
              <div style="background:#1a1020;border:1px solid #ef4444;border-radius:10px;padding:20px 24px;">
                <div style="font-size:10px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Dispositivo rilevato</div>
                <div style="font-size:22px;font-weight:700;color:#f1f5f9;font-family:'Courier New',monospace;letter-spacing:1px;">{{DEVICE}}</div>
              </div>
            </td>
          </tr>

          <!-- Dettagli a griglia -->
          <tr>
            <td style="padding:16px 32px 28px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="50%" style="padding:6px 6px 6px 0;">
                    <div style="background:#111b2e;border:1px solid #1e293b;border-radius:8px;padding:14px 16px;">
                      <div style="font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Modalità armamento</div>
                      <div style="font-size:16px;font-weight:600;color:#4da3ff;">{{MODE}}</div>
                    </div>
                  </td>
                  <td width="50%" style="padding:6px 0 6px 6px;">
                    <div style="background:#111b2e;border:1px solid #1e293b;border-radius:8px;padding:14px 16px;">
                      <div style="font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Zona</div>
                      <div style="font-size:16px;font-weight:600;color:#f59e0b;">{{ZONE}}</div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td width="50%" style="padding:6px 6px 0 0;">
                    <div style="background:#111b2e;border:1px solid #1e293b;border-radius:8px;padding:14px 16px;">
                      <div style="font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Tipo sensore</div>
                      <div style="font-size:16px;font-weight:600;color:#e2e8f0;">{{TYPE}}</div>
                    </div>
                  </td>
                  <td width="50%" style="padding:6px 0 0 6px;">
                    <div style="background:#111b2e;border:1px solid #1e293b;border-radius:8px;padding:14px 16px;">
                      <div style="font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Ora evento</div>
                      <div style="font-size:15px;font-weight:600;color:#e2e8f0;">{{ORA}}</div>
                      <div style="font-size:11px;color:#64748b;margin-top:2px;">{{DATA}}</div>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px 20px;border-top:1px solid #1e293b;text-align:center;">
              <div style="font-size:11px;color:#334155;letter-spacing:1px;">
                &#9632; Sistema di Sicurezza &mdash; Notifica automatica generata dal sistema
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
