<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Notifiche — Sistema di Sicurezza</title>
</head>
<body style="margin:0;padding:0;background:#0b1220;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0b1220;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="580" cellpadding="0" cellspacing="0" style="background:#111b2e;border:1px solid #1e293b;border-radius:12px;overflow:hidden;max-width:580px;width:100%;">

          <!-- Header blu -->
          <tr>
            <td style="background:#0d2040;padding:28px 32px;text-align:center;border-bottom:3px solid #4da3ff;">
              <div style="font-size:40px;margin-bottom:10px;line-height:1;">&#9632;</div>
              <div style="font-size:28px;font-weight:700;color:#4da3ff;letter-spacing:4px;font-family:'Courier New',monospace;">EMAIL DI TEST</div>
              <div style="font-size:11px;color:#3a5070;letter-spacing:2px;margin-top:6px;text-transform:uppercase;">Sistema di sicurezza</div>
            </td>
          </tr>

          <!-- Messaggio principale -->
          <tr>
            <td style="padding:28px 32px 12px;">
              <div style="background:#0d2040;border:1px solid #4da3ff;border-radius:10px;padding:20px 24px;text-align:center;">
                <div style="font-size:16px;color:#94a3b8;margin-bottom:8px;">Le notifiche email sono operative.</div>
                <div style="font-size:13px;color:#64748b;line-height:1.6;">
                  Riceverai un'email simile a questa ogni volta che<br/>
                  il sistema di allarme viene attivato da un sensore.
                </div>
              </div>
            </td>
          </tr>

          <!-- Data e ora -->
          <tr>
            <td style="padding:12px 32px 28px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="50%" style="padding:6px 6px 0 0;">
                    <div style="background:#111b2e;border:1px solid #1e293b;border-radius:8px;padding:14px 16px;">
                      <div style="font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Data test</div>
                      <div style="font-size:16px;font-weight:600;color:#e2e8f0;">{{DATA}}</div>
                    </div>
                  </td>
                  <td width="50%" style="padding:6px 0 0 6px;">
                    <div style="background:#111b2e;border:1px solid #1e293b;border-radius:8px;padding:14px 16px;">
                      <div style="font-size:10px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Ora test</div>
                      <div style="font-size:16px;font-weight:600;color:#e2e8f0;">{{ORA}}</div>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px 20px;border-top:1px solid #1e293b;text-align:center;">
              <div style="font-size:11px;color:#334155;letter-spacing:1px;">
                &#9632; Sistema di Sicurezza &mdash; Email di test generata manualmente
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
